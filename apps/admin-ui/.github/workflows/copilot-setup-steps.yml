name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .ai/context/**
      - api/package.json
      - api/package-lock.json
      - web/package.json
      - web/package-lock.json
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .ai/context/**
      - api/package.json
      - api/package-lock.json
      - web/package.json
      - web/package-lock.json

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            web/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Show shared AI context
        run: |
          echo "Shared agent context:"
          find .ai/context -maxdepth 3 -type f | sort
