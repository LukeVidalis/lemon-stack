<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0d10" />
    <title>Dashboard — lemoncode</title>
    <script>
      try {
        const p = JSON.parse(localStorage.getItem('dashboard:prefs') || '{}');
        const t = p.theme || 'auto';
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        else if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        else if (window.matchMedia('(prefers-color-scheme: light)').matches) document.documentElement.setAttribute('data-theme', 'light');
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
