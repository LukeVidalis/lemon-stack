name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    uses: {{GITHUB_ORG}}/.github/.github/workflows/deploy.yml@main

  smoke-test:
    needs: deploy
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Wait for /health (via local Caddy)
        run: ./scripts/smoke-test.sh notify.{{DOMAIN}} /health 120
