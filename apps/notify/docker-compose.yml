services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      ConnectionStrings__Default: "Host=postgres-shared;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      INTERNAL_SUMMARY_SECRET: ${INTERNAL_SUMMARY_SECRET}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@{{DOMAIN}}}
    networks:
      default: {}
      lemon-internal:
        aliases:
          - notify
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"

networks:
  lemon-internal:
    external: true
