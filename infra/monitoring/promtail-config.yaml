server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Auto-discover all Docker containers via the Docker socket
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          # Only collect from running containers
          - name: status
            values: ["running"]
    relabel_configs:
      # Use container name as the instance label
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      # Expose the Docker image name
      - source_labels: [__meta_docker_container_image]
        target_label: image
      # Expose the compose project name (if any)
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
      # Expose the compose service name (if any)
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # Expose the loki.project label if set by deploy.sh
      - source_labels: [__meta_docker_container_label_loki_project]
        target_label: loki_project
      # Expose the loki.environment label if set by deploy.sh
      - source_labels: [__meta_docker_container_label_loki_environment]
        target_label: environment
      # Set the log path for the Docker log driver
      - source_labels: [__meta_docker_container_id]
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/$1-json.log
    pipeline_stages:
      # Parse Docker's JSON log format
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
      - labels:
          stream:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - output:
          source: output
